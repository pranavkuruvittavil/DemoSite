<!DOCTYPE html>
<html lang="en">
<head>
  <script src="scripts/cookie-banner.js"></script>
<meta charset="UTF-8">
  <title>Advanced Cookie Calculator</title>
  <style>

    p{
      color: #ce0f0f !important;
    }
    body {
      
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f9f9f9;
    }
    input, select, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WL5R55HT"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <h1>:cookie: Advanced Cookie Calculator</h1>
  <input type="number" id="num1" placeholder="First Number">
  <input type="number" id="num2" placeholder="Second Number">
  <select id="operation">
    <option value="+">+</option>
    <option value="-">−</option>
    <option value="*">×</option>
    <option value="/">÷</option>
  </select>
  <div class="cky-audit-table-element"></div>
  <button onclick="calculate()">Calculate</button>
  <div id="result">Result: -</div>
  
  <iframe width="560" height="315" src="https://www.youtube.com/embed/pm-YNwjxfKU?si=Fe7yoHgimuq9lcwi" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

  <script>
    // Cookie Set Helper
    function setCookie(name, value, options = {}) {
      let cookieStr = `${encodeURIComponent(name)}=${encodeURIComponent(value)}`;
      if (options.expires) {
        cookieStr += `; expires=${options.expires.toUTCString()}`;
      }
      if (options.path) {
        cookieStr += `; path=${options.path}`;
      }
      if (options.sameSite) {
        cookieStr += `; SameSite=${options.sameSite}`;
      }
      if (options.secure) {
        cookieStr += `; Secure`;
      }
      document.cookie = cookieStr;
    }
    // Cookie Get Helper
    function getCookie(name) {
      return document.cookie.split('; ').find(row => row.startsWith(name + '='))?.split('=')[1];
    }

    function calculate() {
      const num1 = parseFloat(document.getElementById("num1").value);
      const num2 = parseFloat(document.getElementById("num2").value);
      const op = document.getElementById("operation").value;
      let result = "Invalid";
      if (!isNaN(num1) && !isNaN(num2)) {
        switch (op) {
          case "+": result = num1 + num2; break;
          case "-": result = num1 - num2; break;
          case "*": result = num1 * num2; break;
          case "/": result = num2 !== 0 ? num1 / num2 : "Divide by 0"; break;
        }
        const now = new Date();
        const future = new Date(now.getTime() + 7 * 86400000); // 7 days from now
        // :cookie: Set cookies with different purposes
        setCookie("first_party_cookie", "basic_cookie", { path: "/" });
        setCookie("samesite_strict", "only_first_party", {
          path: "/",
          sameSite: "Strict",
          secure: true // will only work over HTTPS
        });
        setCookie("session_cookie", "session_value", { path: "/" });
        setCookie("persistent_cookie", result, {
          path: "/",
          expires: future
        });
      }
      document.getElementById("result").textContent = "Result: " + result;
    }

    // Load existing result from persistent_cookie
    window.onload = function () {
      const persistent = getCookie("persistent_cookie");
      if (persistent) {
        document.getElementById("result").textContent = "Last Persistent Result: " + decodeURIComponent(persistent);
      }
    };
  </script>
  <!-- Cookie Setter UI -->
  <hr>
  <h2>Set a Cookie</h2>
  <input type="text"   id="cookieName"  placeholder="Cookie name"  style="padding:8px;font-size:15px;margin:4px;">
  <input type="text"   id="cookieValue" placeholder="Cookie value" style="padding:8px;font-size:15px;margin:4px;">
  <input type="number" id="cookieDays"  placeholder="Expire in days (optional)" style="padding:8px;font-size:15px;margin:4px;width:220px;">
  <br>
  <button onclick="handleSetCookie()" style="margin-top:8px;">Set Cookie</button>
  <button onclick="handleGetCookie()" style="margin-top:8px;">Get Cookie</button>
  <button onclick="handleDeleteCookie()" style="margin-top:8px;">Delete Cookie</button>
  <div id="cookieStatus" style="margin-top:12px;font-weight:bold;"></div>

  <script>
    function handleSetCookie() {
      const name  = document.getElementById('cookieName').value.trim();
      const value = document.getElementById('cookieValue').value.trim();
      const days  = parseInt(document.getElementById('cookieDays').value, 10);

      if (!name) {
        document.getElementById('cookieStatus').textContent = 'Please enter a cookie name.';
        return;
      }

      const options = { path: '/' };
      if (!isNaN(days) && days > 0) {
        const expires = new Date(Date.now() + days * 86400000);
        Object.assign(options, { expires });
      }

      setCookie(name, value, options);
      document.getElementById('cookieStatus').textContent =
        `✅ Cookie set → ${name} = ${value}` +
        (!isNaN(days) && days > 0 ? ` (expires in ${days} day(s))` : ' (session cookie)');
    }

    function handleGetCookie() {
      const name = document.getElementById('cookieName').value.trim();
      if (!name) {
        document.getElementById('cookieStatus').textContent = 'Please enter a cookie name to read.';
        return;
      }
      const val = getCookie(name);
      document.getElementById('cookieStatus').textContent =
        val !== undefined
          ? `🍪 ${name} = ${decodeURIComponent(val)}`
          : `❌ Cookie "${name}" not found.`;
    }

    function handleDeleteCookie() {
      const name = document.getElementById('cookieName').value.trim();
      if (!name) {
        document.getElementById('cookieStatus').textContent = 'Please enter a cookie name to delete.';
        return;
      }
      document.cookie = `${encodeURIComponent(name)}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/`;
      document.getElementById('cookieStatus').textContent = `🗑️ Cookie "${name}" deleted.`;
    }
  </script>

</body>
</html>
